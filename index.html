<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIG Web_Adan Belva Bayanaka Abrar</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0e1117;
        --bg2: #161b27;
        --bg3: #1e2535;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(255, 255, 255, 0.15);
        --text: #e8ecf1;
        --text2: #7a8599;
        --text3: #4a5568;
        --accent: #4f9cf9;
        --red: #e05252;
        --blue: #4f9cf9;
        --green: #52c77a;
        --amber: #f0a940;
        --red-dim: rgba(224, 82, 82, 0.15);
        --blue-dim: rgba(79, 156, 249, 0.15);
        --green-dim: rgba(82, 199, 122, 0.15);
        --amber-dim: rgba(240, 169, 64, 0.15);
        --font-main: "IBM Plex Sans", sans-serif;
        --font-mono: "IBM Plex Mono", monospace;
        --radius: 8px;
        --radius-lg: 14px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── HEADER ── */
      header {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .logo-text {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .logo-sub {
        font-size: 11px;
        color: var(--text2);
        font-family: var(--font-mono);
      }
      .header-badge {
        font-size: 10px;
        font-family: var(--font-mono);
        background: var(--blue-dim);
        color: var(--blue);
        border: 1px solid rgba(79, 156, 249, 0.3);
        padding: 3px 10px;
        border-radius: 999px;
      }

      /* ── MAIN LAYOUT ── */
      main {
        display: flex;
        flex: 1;
        gap: 0;
      }

      /* ── SIDEBAR ── */
      #sidebar {
        width: 240px;
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 0;
        overflow-y: auto;
      }
      .side-section {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }
      .side-label {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--text3);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      /* Controls */
      select,
      button,
      input[type="text"] {
        font-family: var(--font-main);
        font-size: 12px;
        background: var(--bg3);
        color: var(--text);
        border: 1px solid var(--border2);
        border-radius: var(--radius);
        padding: 7px 11px;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      select:hover,
      button:hover {
        background: #263045;
        border-color: rgba(255, 255, 255, 0.25);
      }
      button:active {
        transform: scale(0.97);
      }

      .btn-full {
        width: 100%;
        margin-bottom: 6px;
        text-align: left;
      }
      .btn-icon {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-red {
        border-color: rgba(224, 82, 82, 0.4);
        color: var(--red);
      }
      .btn-red:hover {
        background: var(--red-dim);
      }
      .btn-blue {
        border-color: rgba(79, 156, 249, 0.4);
        color: var(--blue);
      }
      .btn-blue:hover {
        background: var(--blue-dim);
      }
      .btn-green {
        border-color: rgba(82, 199, 122, 0.4);
        color: var(--green);
      }
      .btn-green:hover {
        background: var(--green-dim);
      }
      .btn-amber {
        border-color: rgba(240, 169, 64, 0.4);
        color: var(--amber);
      }
      .btn-amber:hover {
        background: var(--amber-dim);
      }

      .btn-toggle {
        width: 100%;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      .btn-toggle.active {
        background: var(--blue-dim);
        border-color: rgba(79, 156, 249, 0.4);
        color: var(--blue);
      }

      select {
        width: 100%;
        margin-bottom: 8px;
      }

      /* Stats */
      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
      }
      .stat-row:last-child {
        border-bottom: none;
      }
      .stat-label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text2);
      }
      .stat-val {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      /* Filter chips */
      .chips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .chip {
        font-size: 11px;
        font-family: var(--font-mono);
        padding: 3px 9px;
        border-radius: 999px;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--text2);
        cursor: pointer;
        transition: all 0.15s;
      }
      .chip:hover {
        border-color: rgba(255, 255, 255, 0.25);
        color: var(--text);
      }
      .chip.active {
        background: var(--blue-dim);
        border-color: rgba(79, 156, 249, 0.5);
        color: var(--blue);
      }

      /* Info panel */
      #info-panel {
        font-size: 12px;
        line-height: 1.9;
        color: var(--text2);
        font-family: var(--font-mono);
      }

      /* ── MAP AREA ── */
      #map-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 16px;
        gap: 12px;
        min-width: 0;
      }
      #map-wrap {
        flex: 1;
        position: relative;
        border-radius: var(--radius-lg);
        overflow: hidden;
        border: 1px solid var(--border2);
        background:
          radial-gradient(ellipse at 20% 30%, rgba(79, 156, 249, 0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 70%, rgba(82, 199, 122, 0.06) 0%, transparent 60%), linear-gradient(160deg, #12233a 0%, #0d1e17 60%, #0e1117 100%);
        min-height: 400px;
      }
      #map-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
      }

      #heatmap-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #svg-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: visible;
      }
      #markers-layer {
        position: absolute;
        inset: 0;
      }

      #coords-overlay {
        position: absolute;
        bottom: 10px;
        left: 12px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
        pointer-events: none;
      }

      /* Tooltip */
      #tooltip {
        position: absolute;
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: var(--radius);
        padding: 6px 10px;
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text);
        pointer-events: none;
        display: none;
        z-index: 30;
        white-space: nowrap;
      }

      /* Markers */
      .marker {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        position: absolute;
        transform: translate(-50%, -50%);
        cursor: pointer;
        border: 2px solid rgba(255, 255, 255, 0.25);
        transition:
          transform 0.12s,
          box-shadow 0.12s,
          opacity 0.2s;
        z-index: 5;
      }
      .marker::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        background: inherit;
        opacity: 0.15;
      }
      .marker:hover {
        transform: translate(-50%, -50%) scale(1.5);
        box-shadow: 0 0 12px currentColor;
        z-index: 10;
      }
      .marker.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .marker.route-selected {
        box-shadow: 0 0 0 3px rgba(240, 169, 64, 0.6);
        transform: translate(-50%, -50%) scale(1.3);
      }
      .marker.merah {
        background: var(--red);
        color: var(--red);
      }
      .marker.biru {
        background: var(--blue);
        color: var(--blue);
      }
      .marker.hijau {
        background: var(--green);
        color: var(--green);
      }

      /* Status bar */
      #status-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text3);
        padding: 6px 10px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      #status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <header>
        <div>
          <div class="logo-text">WebGIS</div>
          <div class="logo-sub">Internet Programming · Adan Belva Bayanaka Abrar 2026</div>
        </div>
      </div>
    </header>

    <main>
      <!-- SIDEBAR -->
      <aside id="sidebar">
        <!-- Tambah Marker -->
        <div class="side-section">
          <div class="side-label">Tambah Marker</div>
          <select id="sel-type">
            <option value="merah"> Merah</option>
            <option value="biru"> Biru</option>
            <option value="hijau"> Hijau</option>
          </select>
          <button class="btn-full btn-icon" id="btn-add"><span>+</span> Tambah Marker Acak</button>
          <button class="btn-full btn-icon btn-red" id="btn-clear-all"><span>✕</span> Hapus Semua Marker</button>
        </div>

        <!-- Statistik -->
        <div class="side-section">
          <div class="side-label">Statistik</div>
          <div class="stat-row">
            <span class="stat-label"><span class="dot" style="background: var(--red)"></span>Merah</span>
            <span class="stat-val" id="cnt-merah">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label"><span class="dot" style="background: var(--blue)"></span>Biru</span>
            <span class="stat-val" id="cnt-biru">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label"><span class="dot" style="background: var(--green)"></span>Hijau</span>
            <span class="stat-val" id="cnt-hijau">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label" style="color: var(--text); font-weight: 500">Total</span>
            <span class="stat-val" id="cnt-total">0</span>
          </div>
        </div>

        <!-- Filter -->
        <div class="side-section">
          <div class="side-label">Filter Tampilan</div>
          <div class="chips">
            <button class="chip active" data-filter="semua">Semua</button>
            <button class="chip" data-filter="merah" style="color: var(--red)">Merah</button>
            <button class="chip" data-filter="biru" style="color: var(--blue)">Biru</button>
            <button class="chip" data-filter="hijau" style="color: var(--green)">Hijau</button>
          </div>
        </div>

        <!-- Fitur Peta -->
        <div class="side-section">
          <div class="side-label">Fitur Peta</div>
          <button class="btn-full btn-toggle btn-blue" id="btn-route"><span>⇌</span> Routing (pilih 2 marker)</button>
          <button class="btn-full btn-icon btn-amber" id="btn-clear-route"><span>↺</span> Hapus Semua Rute</button>
          <button class="btn-full btn-toggle btn-green" id="btn-heatmap" style="margin-top: 6px"><span>◉</span> Heatmap</button>
        </div>

        <!-- Info Marker -->
        <div class="side-section" style="flex: 1">
          <div class="side-label">Info Marker</div>
          <div id="info-panel" style="color: var(--text3)">— klik marker —</div>
        </div>
      </aside>

      <!-- MAP -->
      <section id="map-section">
        <div id="map-wrap">
          <canvas id="heatmap-canvas"></canvas>
          <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
          <div id="markers-layer"></div>
          <div id="tooltip"></div>
          <div id="coords-overlay">x: — · y: —</div>
        </div>
        <div id="status-bar">
          <div id="status-dot"></div>
          <span id="status-text">Siap. Tambahkan marker ke peta.</span>
        </div>
      </section>
    </main>

    <!-- JavaScript dipisah ke file app.js -->
    <script src="app.js"></script>
  </body>
</html>
